name: Deploy to GitHub Pages

on:
  push:
    branches: ["master"]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

env:
  MIRROR_LOCATION: http://weakish.github.io

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      # DO NOT remove fetch-depth: 0 to "optimize" CI time.
      # The site uses getGitDate() to extract page dates from git history.
      # Without full history, all items in RSS feed and sitemap get the same pubDate (build date).
      # See: https://github.com/weakish/weakish.github.com/issues/32
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: denoland/setup-deno@v2
        with:
          deno-version: v2.x
      - run: deno task build
      - uses: actions/upload-pages-artifact@v3
        with:
          path: _site
      - uses: actions/deploy-pages@v4